name: gamified_todo_app
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.0
  get: ^4.7.3
  pretty_dio_logger: ^1.4.0
  flutter_secure_storage: ^10.0.0
  flutter_dotenv: ^6.0.0
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.10.5
  flutter_gen_runner: ^5.12.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - env/.env.dev
    - env/.env.prod
    - assets/images/commons/

# to generate the code for assets, fonts, etc., run:
# dart run build_runner build --delete-conflicting-outputs
flutter_gen:
  output: lib/gen/
  integrations:
    image: true
    flutter_svg: true
    # rive: true
    # lottie: true