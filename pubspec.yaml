name: gamified_todo_app
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.0
  get: ^4.7.3
  pretty_dio_logger: ^1.4.0
  flutter_secure_storage: ^10.0.0
  flutter_dotenv: ^6.0.0
  flutter_native_splash: ^2.4.7
  contribution_heatmap: ^0.5.3
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.10.5
  flutter_gen_runner: ^5.12.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - env/.env.dev
    - env/.env.prod
    - assets/fonts/oxanium/
    - assets/images/commons/
    - assets/images/onboarding/

  fonts:
    - family: Oxanium
      fonts:
        - asset: assets/fonts/oxanium/Oxanium-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/oxanium/Oxanium-Light.ttf
          weight: 300
        - asset: assets/fonts/oxanium/Oxanium-Regular.ttf
        - asset: assets/fonts/oxanium/Oxanium-Medium.ttf
          weight: 500
        - asset: assets/fonts/oxanium/Oxanium-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/oxanium/Oxanium-Bold.ttf
          weight: 700
        - asset: assets/fonts/oxanium/Oxanium-ExtraBold.ttf
          weight: 800

# to generate the code for assets, fonts, etc., run:
# dart run build_runner build --delete-conflicting-outputs
flutter_gen:
  output: lib/gen/
  integrations:
    image: true
    flutter_svg: true
    # rive: true
    # lottie: true
